  <text x="50%" y="44%" text-anchor="middle" font-family="Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="32.5" letter-spacing="4" font-weight="700" fill="#c1121f">Együtt működik igazán</text>
  <text x="50%" y="56%" text-anchor="middle" font-family="Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="45.5" letter-spacing="4" font-weight="900" fill="#f2f2f2">MAW OF THE VOID</text>
  <text x="50%" y="68%" text-anchor="middle" font-family="Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="20.8" letter-spacing="2" font-weight="500" fill="#b5b5b5">nyers energia • közös hangzás</text>
